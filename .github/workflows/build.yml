name: Build & Push Docker Images

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_BASENAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image_name: db
            context: db
            dockerfile: db/Dockerfile
          - image_name: judger
            context: judger
            dockerfile: judger/Dockerfile
          - image_name: remote-judger
            context: remote_judger
            dockerfile: remote_judger/Dockerfile
          - image_name: web
            context: .
            dockerfile: web/Dockerfile
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Replace version
        run: |
          sed -i "s/'s2oj-version' => 'dev'/'s2oj-version' => '$(echo "${{ github.sha }}" | cut -c1-7)'/g" web/app/.default-config.php

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v2.1.0
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v4.3.0
        with:
          images: |
            ghcr.io/${{ env.IMAGE_BASENAME }}-${{ matrix.image_name }}
            hkccr.ccs.tencentyun.com/baoshuo/${{ env.IMAGE_BASENAME }}-${{ matrix.image_name }}
          tags: |
            latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v3.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
